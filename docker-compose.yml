services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=alvorada_db
      - DB_USERNAME=alvorada_user
      - DB_PASSWORD=alvorada_password
      - VITE_DEV_SERVER_URL=http://localhost:5173
      - AI_SERVICE_URL=http://ai-service:3001
      - LLM_API_KEY=${LLM_API_KEY:-}

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - LARAVEL_API_URL=http://app:8000/api
      - OPENROUTER_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-google/gemini-2.0-flash-001}
    depends_on:
      app:
        condition: service_started

  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: alvorada_db
      POSTGRES_USER: alvorada_user
      POSTGRES_PASSWORD: alvorada_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alvorada_user -d alvorada_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
